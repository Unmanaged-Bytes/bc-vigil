{% macro time_picker(initial='00:00') -%}
<span class="time-picker" data-time-picker>
  <select data-time-hour aria-label="heure">
    {%- for h in range(24) %}<option value="{{ '%02d' % h }}">{{ '%02d' % h }}</option>{% endfor %}
  </select>
  :
  <select data-time-minute aria-label="minute">
    {%- for m in range(0, 60, 5) %}<option value="{{ '%02d' % m }}">{{ '%02d' % m }}</option>{% endfor %}
  </select>
  <input type="hidden" name="time" value="{{ initial }}" data-time-hidden>
</span>
{%- endmacro %}
