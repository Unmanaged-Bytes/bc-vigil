name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb for Debian trixie
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches debian/changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CHANGELOG_VER=$(dpkg-parsechangelog -l debian/changelog -S Version | cut -d- -f1 || true)
          if [ -z "$CHANGELOG_VER" ]; then
            sudo apt-get update
            sudo apt-get install -y dpkg-dev
            CHANGELOG_VER=$(dpkg-parsechangelog -l debian/changelog -S Version | cut -d- -f1)
          fi
          echo "tag=$TAG changelog=$CHANGELOG_VER"
          if [ "$TAG" != "$CHANGELOG_VER" ]; then
            echo "ERROR: tag '$TAG' does not match debian/changelog version '$CHANGELOG_VER'" >&2
            exit 1
          fi

      - name: Build in debian:trixie container
        run: |
          docker run --rm -v "$PWD:/src" -w /src --entrypoint /bin/bash debian:trixie -c '
            set -eux
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
                debhelper dh-virtualenv python3 python3-dev python3-venv \
                build-essential devscripts ca-certificates
            dpkg-buildpackage -us -uc -b
            mkdir -p /src/dist
            mv /bc-vigil_*.deb /bc-vigil_*.buildinfo /bc-vigil_*.changes /src/dist/ || true
            mv ../bc-vigil_*.deb ../bc-vigil_*.buildinfo ../bc-vigil_*.changes /src/dist/ 2>/dev/null || true
          '

      - name: Collect artefacts
        run: |
          ls -la dist/
          # sanity check: at least one .deb must be present
          [ -n "$(ls dist/*.deb 2>/dev/null)" ]

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.buildinfo
            dist/*.changes
          generate_release_notes: true
          fail_on_unmatched_files: true
